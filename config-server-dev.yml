server:
  port: 8888

spring:
  application:
    name: config-server
  
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
    
  profiles:
    active: native  # 使用本地文件系统配置，无需Git

# Eureka 客户端配置
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics