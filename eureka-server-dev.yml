server:
  port: 8761

spring:
  application:
    name: eureka-server

# Eureka 配置
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: false  # 开发环境关闭自我保护模式
    
# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics